<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steel Ranger - Boss Rush Engine</title>
<style>
  body{margin:0;padding:0;background:#05070a;display:flex;flex-direction:column;align-items:center;
       justify-content:center;min-height:100vh;font-family:'Courier New',Courier,monospace;color:#eee;}
  canvas{background:#000;border:4px solid #1a237e;box-shadow:0 0 30px rgba(0,229,255,.15);image-rendering:pixelated;}
  #instructions{margin-top:10px;font-size:12px;color:#617d98;text-align:center;letter-spacing:.5px;max-width:900px;}
  .key{color:#00e5ff;font-weight:bold;}
</style>
</head>
<body>
<canvas id="gameCanvas" width="900" height="520"></canvas>
<div id="instructions">
  [<span class="key">&larr;/&rarr;</span> or <span class="key">A/D</span>] Move &nbsp;
  [<span class="key">Z / Space</span>] Jump / Confirm &nbsp;
  [<span class="key">X</span>] Shoot &nbsp;
  [<span class="key">C</span>] Switch Weapon &nbsp;
  [<span class="key">Q</span>] Return to Hub &nbsp;
  [<span class="key">P</span>] Pause &nbsp;
  [<span class="key">R</span>] Restart Room
</div>

<script>
/* ============================================================
   STEEL RANGER — hub + 4 boss rooms + weakness-chain weapons
   Single-file canvas engine, no external assets.
============================================================ */

const GRAVITY = 1300;
const TERMINAL_V = 850;
const TILE = 32;
const SCREEN_W = 900;
const SCREEN_H = 520;

const C_BG = '#05070a';
const C_WALL = '#1c2331';
const C_SPIKE = '#d50000';
const C_HERO = '#4dd2ff';
const C_HERO_DARK = '#123a8f';
const C_ENEMY = '#ff4081';

/* ---------------- AUDIO ---------------- */
const Audio = {
  ctx:null,
  init(){ if(!this.ctx) this.ctx=new (window.AudioContext||window.webkitAudioContext)();
          if(this.ctx.state==='suspended') this.ctx.resume(); },
  tone(freq,type,dur,vol=0.1){
    if(!this.ctx) return;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,this.ctx.currentTime);
    g.gain.setValueAtTime(vol,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01,this.ctx.currentTime+dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(); o.stop(this.ctx.currentTime+dur);
  },
  sfx:{
    jump:()=>Audio.tone(320,'sine',0.18,0.1),
    shootBuster:()=>Audio.tone(500,'square',0.08,0.06),
    shootFlame:()=>Audio.tone(260,'sawtooth',0.14,0.09),
    shootAqua:()=>Audio.tone(600,'triangle',0.12,0.08),
    shootVolt:()=>Audio.tone(800,'square',0.1,0.08),
    shootTerra:()=>Audio.tone(160,'sawtooth',0.2,0.1),
    hit:()=>Audio.tone(110,'sawtooth',0.25,0.1),
    kill:()=>Audio.tone(650,'square',0.12,0.1),
    bossHit:()=>Audio.tone(90,'sawtooth',0.1,0.12),
    pickup:()=>Audio.tone(820,'sine',0.25,0.1),
    select:()=>Audio.tone(440,'square',0.06,0.08),
    confirm:()=>Audio.tone(700,'square',0.15,0.1),
    victory:()=>Audio.tone(950,'sine',0.4,0.12),
    warn:()=>Audio.tone(220,'square',0.3,0.08)
  }
};

/* ---------------- INPUT ---------------- */
const Input = {
  keys:{}, prevKeys:{},
  map:{
    'KeyA':'left','ArrowLeft':'left',
    'KeyD':'right','ArrowRight':'right',
    'KeyW':'jump','ArrowUp':'jump','Space':'jump','KeyZ':'jump',
    'KeyX':'shoot',
    'KeyC':'switch',
    'KeyQ':'hub',
    'KeyP':'pause',
    'KeyR':'restart'
  },
  state:{left:false,right:false,jump:false,shoot:false,switch:false,hub:false,pause:false,restart:false},
  pressed:{left:false,right:false,jump:false,shoot:false,switch:false,hub:false,pause:false,restart:false},
  init(){
    window.addEventListener('keydown',e=>{
      if(this.map[e.code]){ this.keys[this.map[e.code]]=true; Audio.init(); e.preventDefault(); }
    });
    window.addEventListener('keyup',e=>{
      if(this.map[e.code]) this.keys[this.map[e.code]]=false;
    });
  },
  update(){
    for(const a in this.state){
      this.pressed[a]=this.keys[a] && !this.prevKeys[a];
      this.prevKeys[a]=this.keys[a];
      this.state[a]=this.keys[a];
    }
  }
};

function rectIntersect(a,b){
  return !(b.x>a.x+a.w || b.x+b.w<a.x || b.y>a.y+a.h || b.y+b.h<a.y);
}
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

/* ---------------- WEAPONS ---------------- */
/* key indexes into WEAPONS array; weakTo on a boss references a weapon key */
const WEAPONS = [
  {key:'buster', name:'Buster',     color:'#ffff00', dmg:1, ammoMax:Infinity, cooldown:0.22, cost:0},
  {key:'flame',  name:'Flame Shot', color:'#ff7043', dmg:3, ammoMax:16,       cooldown:0.30, cost:1},
  {key:'aqua',   name:'Aqua Splash',color:'#29b6f6', dmg:3, ammoMax:20,       cooldown:0.42, cost:1},
  {key:'volt',   name:'Volt Spark', color:'#ffee58', dmg:3, ammoMax:14,       cooldown:0.36, cost:1},
  {key:'terra',  name:'Terra Break',color:'#8d6e63', dmg:4, ammoMax:10,       cooldown:0.55, cost:1}
];

/* ---------------- SAVE STATE ---------------- */
const Save = {
  key:'steelRangerProgress',
  data:{defeated:[false,false,false,false], ammo:{flame:16,aqua:20,volt:14,terra:10}},
  load(){
    try{
      const raw = localStorage.getItem(this.key);
      if(raw) this.data = Object.assign(this.data, JSON.parse(raw));
    }catch(e){}
  },
  store(){
    try{ localStorage.setItem(this.key, JSON.stringify(this.data)); }catch(e){}
  },
  reset(){
    this.data = {defeated:[false,false,false,false], ammo:{flame:16,aqua:20,volt:14,terra:10}};
    this.store();
  }
};

/* ---------------- ENTITY BASE ---------------- */
class Entity {
  constructor(x,y,w,h,color){
    this.x=x; this.y=y; this.w=w; this.h=h; this.color=color;
    this.vx=0; this.vy=0;
    this.hp=1; this.maxHp=1;
    this.invincibleTimer=0;
    this.facing=1;
    this.grounded=false;
    this.markedForDeletion=false;
  }
  update(dt,map){
    this.vy+=GRAVITY*dt;
    if(this.vy>TERMINAL_V) this.vy=TERMINAL_V;
    this.x+=this.vx*dt; this.collideMap(map,'x');
    this.y+=this.vy*dt; this.collideMap(map,'y');
    if(this.invincibleTimer>0) this.invincibleTimer-=dt;
  }
  collideMap(map,axis){
    const startX=Math.floor(this.x/TILE), endX=Math.floor((this.x+this.w-0.1)/TILE);
    const startY=Math.floor(this.y/TILE), endY=Math.floor((this.y+this.h-0.1)/TILE);
    for(let y=startY;y<=endY;y++){
      for(let x=startX;x<=endX;x++){
        const t=map.getTile(x,y);
        if(t===1){
          if(axis==='x'){
            if(this.vx>0) this.x=x*TILE-this.w;
            else if(this.vx<0) this.x=(x+1)*TILE;
            this.vx=0;
          } else {
            if(this.vy>0){ this.y=y*TILE-this.h; this.grounded=true; }
            else if(this.vy<0){ this.y=(y+1)*TILE; }
            this.vy=0;
          }
          return;
        }
      }
    }
    if(axis==='y') this.grounded=false;
  }
  takeDamage(amount){
    if(this.invincibleTimer>0) return;
    this.hp-=amount;
    this.invincibleTimer=0.5;
    Audio.sfx.hit();
    if(this.hp<=0){ this.markedForDeletion=true; this.onDeath(); }
  }
  onDeath(){
    for(let i=0;i<8;i++) Game.particles.push(new Particle(this.x+this.w/2,this.y+this.h/2,this.color));
  }
  draw(ctx,camX){
    if(this.invincibleTimer>0 && Math.floor(Date.now()/50)%2===0) return;
    ctx.fillStyle=this.color;
    ctx.fillRect(Math.floor(this.x-camX),Math.floor(this.y),this.w,this.h);
  }
}

/* ---------------- PLAYER (soldier-style hero) ---------------- */
class Player extends Entity {
  constructor(x,y){
    super(x,y,24,32,C_HERO);
    this.speed=210;
    this.jumpForce=-500;
    this.maxHp=28;
    this.hp=this.maxHp;
    this.shootTimer=0;
    this.checkpoint={x,y};
    this.weaponIndex=0; // index into unlockedWeapons()
    this.animT=0;
    this.runFrame=0;
    this.muzzle=0;
  }
  unlockedWeapons(){
    const list=[WEAPONS[0]];
    Save.data.defeated.forEach((d,i)=>{ if(d) list.push(WEAPONS[i+1]); });
    return list;
  }
  currentWeapon(){ return this.unlockedWeapons()[this.weaponIndex]; }
  ammoFor(weapon){
    if(weapon.key==='buster') return Infinity;
    return Save.data.ammo[weapon.key];
  }
  switchWeapon(){
    const list=this.unlockedWeapons();
    this.weaponIndex=(this.weaponIndex+1)%list.length;
    Audio.sfx.select();
  }
  update(dt,map){
    this.animT+=dt;
    if(Input.pressed.jump && this.grounded){
      this.vy=this.jumpForce; this.grounded=false; Audio.sfx.jump();
    }
    if(Input.state.left){ this.vx=-this.speed; this.facing=-1; }
    else if(Input.state.right){ this.vx=this.speed; this.facing=1; }
    else this.vx=0;

    if(this.shootTimer>0) this.shootTimer-=dt;
    if(this.muzzle>0) this.muzzle-=dt;
    if(Input.state.shoot && this.shootTimer<=0) this.shoot();

    if(Input.pressed.switch) this.switchWeapon();

    if(!this.grounded) this.runFrame=this.vy<0?0:1;
    else if(Math.abs(this.vx)>1){ this.runFrame = Math.floor(this.animT*7)%2 + 2; }
    else this.runFrame=4;

    super.update(dt,map);
    if(this.y>SCREEN_H+200) this.die();

    const cx=this.x+this.w/2, cy=this.y+this.h/2;
    const tx=Math.floor(cx/TILE), ty=Math.floor(cy/TILE);
    if(map.getTile(tx,ty)===2){ this.takeDamage(4); this.vy=-320; }
  }
  shoot(){
    const w=this.currentWeapon();
    const ammo=this.ammoFor(w);
    if(ammo<=0){ this.weaponIndex=0; return; }
    if(w.key!=='buster') Save.data.ammo[w.key]-=w.cost;

    const bx=this.facing===1? this.x+this.w : this.x-10;
    const by=this.y+12;
    switch(w.key){
      case 'buster':
        Game.bullets.push(new Bullet(bx,by,this.facing*560,0,true,w.dmg,'buster',w.color));
        Audio.sfx.shootBuster(); break;
      case 'flame':
        Game.bullets.push(new Bullet(bx,by,this.facing*620,0,true,w.dmg,'flame',w.color));
        Audio.sfx.shootFlame(); break;
      case 'aqua':
        for(let i=-1;i<=1;i++){
          const b=new Bullet(bx,by,this.facing*420,i*-90,true,w.dmg,'aqua',w.color);
          b.gravity=true; Game.bullets.push(b);
        }
        Audio.sfx.shootAqua(); break;
      case 'volt':{
        const b=new Bullet(bx,by,this.facing*480,0,true,w.dmg,'volt',w.color);
        b.bounces=3; Game.bullets.push(b);
        Audio.sfx.shootVolt(); break;
      }
      case 'terra':{
        const b=new Bullet(bx,by,this.facing*360,-60,true,w.dmg,'terra',w.color);
        b.gravity=true; b.w=14; b.h=14; Game.bullets.push(b);
        Audio.sfx.shootTerra(); break;
      }
    }
    this.shootTimer=w.cooldown;
    this.muzzle=0.08;
  }
  die(){
    Audio.sfx.kill();
    this.hp=this.maxHp;
    this.x=this.checkpoint.x; this.y=this.checkpoint.y;
    this.vx=0; this.vy=0;
  }
  draw(ctx,camX){
    const px=Math.floor(this.x-camX), py=Math.floor(this.y);
    if(this.invincibleTimer>0 && Math.floor(Date.now()/50)%2===0) return;
    const f=this.facing;
    ctx.save();
    // outline
    ctx.fillStyle='#000';
    ctx.fillRect(px-2,py-2,this.w+4,this.h+4);
    // legs
    ctx.fillStyle=C_HERO_DARK;
    const legSpread = this.runFrame===3?6:(this.runFrame===2?2:0);
    ctx.fillRect(px+4, py+this.h-10, 6, 10);
    ctx.fillRect(px+this.w-10-legSpread*f*0, py+this.h-10, 6, 10);
    if(this.runFrame===0){ // jump: one bent one straight
      ctx.fillRect(px+4, py+this.h-14, 6, 8);
      ctx.fillRect(px+this.w-10, py+this.h-6, 6, 6);
    } else if(this.runFrame===1){ // fall: both bent
      ctx.fillRect(px+4, py+this.h-12, 6, 6);
      ctx.fillRect(px+this.w-10, py+this.h-12, 6, 6);
    } else if(this.runFrame===2){
      ctx.fillRect(px+2, py+this.h-10, 6, 10);
      ctx.fillRect(px+this.w-8, py+this.h-10, 6, 10);
    } else if(this.runFrame===3){
      ctx.fillRect(px-1, py+this.h-9, 6, 9);
      ctx.fillRect(px+this.w-5, py+this.h-9, 6, 9);
    }
    // torso / body armor
    const breathe = this.runFrame===4 ? Math.sin(this.animT*2)*1 : 0;
    ctx.fillStyle=C_HERO_DARK;
    ctx.fillRect(px+3, py+10+breathe, this.w-6, this.h-18);
    ctx.fillStyle=this.color;
    ctx.fillRect(px+5, py+12+breathe, this.w-10, this.h-22);
    // chest stripe (soldier insignia)
    ctx.fillStyle='#ffffff';
    ctx.fillRect(px+this.w/2-2, py+13+breathe, 4, this.h-24);
    // helmet
    ctx.fillStyle=C_HERO_DARK;
    ctx.beginPath();
    ctx.arc(px+this.w/2, py+8, 9, Math.PI, 0);
    ctx.fill();
    ctx.fillRect(px+this.w/2-9, py+8, 18, 4);
    ctx.fillStyle=this.color;
    ctx.beginPath();
    ctx.arc(px+this.w/2, py+8, 6, Math.PI, 0);
    ctx.fill();
    // visor
    ctx.fillStyle='#0b0e14';
    const visorX = f===1? px+this.w/2 : px+this.w/2-6;
    ctx.fillRect(visorX, py+5, 6, 3);
    // gun arm
    ctx.fillStyle='#333';
    const gunX = f===1 ? px+this.w-4 : px-10;
    ctx.fillRect(gunX, py+13, 14, 6);
    if(this.muzzle>0){
      ctx.fillStyle='#fff59d';
      ctx.beginPath();
      ctx.arc(f===1?gunX+16:gunX-2, py+16, 5,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

/* ---------------- BULLET ---------------- */
class Bullet {
  constructor(x,y,vx,vy,isPlayer,dmg,kind,color){
    this.x=x; this.y=y;
    this.w= kind==='flame'?10:(kind==='terra'?14:8);
    this.h=this.w;
    this.vx=vx; this.vy=vy;
    this.isPlayer=isPlayer;
    this.dmg=dmg; this.kind=kind; this.color=color||'#fff';
    this.gravity=false; this.bounces=0; this.homing=false;
    this.life=2.2;
    this.markedForDeletion=false;
  }
  update(dt,map){
    if(this.homing && Game.player){
      const dx=Game.player.x-this.x, dy=Game.player.y-this.y;
      const mag=Math.hypot(dx,dy)||1;
      this.vx += (dx/mag)*260*dt;
      this.vy += (dy/mag)*260*dt;
      const spd=Math.hypot(this.vx,this.vy);
      const maxSpd=260;
      if(spd>maxSpd){ this.vx=this.vx/spd*maxSpd; this.vy=this.vy/spd*maxSpd; }
    }
    if(this.gravity) this.vy += 900*dt;
    this.x+=this.vx*dt;
    this.y+=this.vy*dt;
    this.life-=dt;
    if(this.life<=0){ this.markedForDeletion=true; return; }

    const cx=Math.floor((this.x+this.w/2)/TILE), cy=Math.floor((this.y+this.h/2)/TILE);
    const tile=map.getTile(cx,cy);
    if(tile===1){
      if(this.bounces>0){ this.vx=-this.vx; this.bounces--; }
      else this.markedForDeletion=true;
    }
  }
  draw(ctx,camX){
    const px=Math.floor(this.x-camX), py=Math.floor(this.y);
    ctx.fillStyle='#000';
    ctx.fillRect(px-1,py-1,this.w+2,this.h+2);
    ctx.fillStyle=this.color;
    ctx.fillRect(px,py,this.w,this.h);
  }
}

/* ---------------- HAZARD (lightning strike telegraphed zone) ---------------- */
class Hazard {
  constructor(x,w){
    this.x=x; this.w=w; this.warn=0.6; this.active=0.22; this.done=false; this.hit=false;
  }
  update(dt,player){
    if(this.warn>0){ this.warn-=dt; return; }
    this.active-=dt;
    if(!this.hit && rectIntersect({x:this.x,y:0,w:this.w,h:SCREEN_H},player)){
      player.takeDamage(5); this.hit=true;
    }
    if(this.active<=0) this.done=true;
  }
  draw(ctx,camX){
    const px=Math.floor(this.x-camX);
    if(this.warn>0){
      ctx.fillStyle='rgba(255,238,88,0.25)';
      ctx.fillRect(px,0,this.w,SCREEN_H);
    } else {
      ctx.fillStyle='rgba(255,238,88,0.75)';
      ctx.fillRect(px,0,this.w,SCREEN_H);
    }
  }
}

/* ---------------- ENEMY (filler grunts) ---------------- */
class Enemy extends Entity {
  constructor(x,y,type){
    super(x,y,24,24, type===0?C_ENEMY:'#ab47bc');
    this.type=type; this.hp=4; this.timer=0; this.dir=1; this.origY=y;
  }
  update(dt,map,player){
    if(Math.abs(player.x-this.x)>650) return;
    if(this.type===0){
      this.vx=55*this.dir;
      super.update(dt,map);
      const lookX=Math.floor((this.x+this.w/2+(this.w/2+5)*this.dir)/TILE);
      const wall=map.getTile(lookX,Math.floor(this.y/TILE));
      const floor=map.getTile(lookX,Math.floor((this.y+this.h+5)/TILE));
      if(wall===1||floor===0) this.dir*=-1;
    } else {
      this.timer+=dt;
      if(this.timer>1.8){
        const dx=player.x-this.x;
        Game.bullets.push(new Bullet(this.x,this.y+8,Math.sign(dx)*260,0,false,3,'enemy','#ff5252'));
        this.timer=0;
      }
      this.invincibleTimer-=dt;
    }
    if(rectIntersect(this,player)) player.takeDamage(3);
  }
}

/* ---------------- BOSS (4 distinct patterns) ---------------- */
class Boss extends Entity {
  constructor(cfg){
    super(cfg.x,cfg.y,cfg.w,cfg.h,cfg.color);
    this.cfg=cfg;
    this.kind=cfg.kind;
    this.maxHp=cfg.hp; this.hp=this.maxHp;
    this.state='INTRO';
    this.stateTimer=1.2;
    this.subTimer=0;
    this.originX=cfg.x; this.originY=cfg.y;
    this.name=cfg.name;
  }
  weakTo(){ return this.cfg.weakTo; }
  update(dt,map,player){
    if(this.state==='INTRO'){
      this.stateTimer-=dt;
      if(this.stateTimer<=0){ this.state='IDLE'; this.stateTimer=1; }
      return;
    }
    this.stateTimer-=dt;
    switch(this.kind){
      case 'hornet': this.updateHornet(dt,player); break;
      case 'serpent': this.updateSerpent(dt,player); break;
      case 'falcon': this.updateFalcon(dt,player,map); break;
      case 'golem': this.updateGolem(dt,player); break;
    }
    if(rectIntersect(this,player)) player.takeDamage(this.cfg.contactDmg||6);
  }
  updateHornet(dt,player){
    this.subTimer+=dt;
    this.y=this.originY+Math.sin(this.subTimer*2.2)*40;
    if(this.state==='IDLE' && this.stateTimer<=0){
      this.state='FAN'; this.stateTimer=0.1;
    } else if(this.state==='FAN' && this.stateTimer<=0){
      for(let i=-1;i<=1;i++){
        const dx=(player.x-this.x), dy=(player.y-this.y)+i*70;
        const mag=Math.hypot(dx,dy)||1;
        Game.bullets.push(new Bullet(this.x,this.y+30,(dx/mag)*300,(dy/mag)*300,false,4,'enemyfire','#ff7043'));
      }
      Audio.sfx.shootFlame();
      this.state='IDLE'; this.stateTimer=1.6;
    }
  }
  updateSerpent(dt,player){
    this.subTimer+=dt;
    this.y=this.originY+Math.sin(this.subTimer*1.6)*55;
    if(this.state==='IDLE' && this.stateTimer<=0){
      const b=new Bullet(this.x,this.y+20,player.x>this.x?150:-150,0,false,4,'enemywater','#29b6f6');
      b.homing=true; Game.bullets.push(b);
      Audio.sfx.shootAqua();
      this.state='IDLE'; this.stateTimer=1.8;
    }
  }
  updateFalcon(dt,player,map){
    if(this.state==='IDLE'){
      if(this.stateTimer<=0){
        Audio.sfx.warn();
        Game.hazards.push(new Hazard(player.x-40,80));
        this.state='TELEGRAPH'; this.stateTimer=0.6;
      }
    } else if(this.state==='TELEGRAPH'){
      if(this.stateTimer<=0){
        this.vx=(player.x<this.x?-1:1)* -620;
        this.state='DASH'; this.subTimer=0.35;
      }
    } else if(this.state==='DASH'){
      this.subTimer-=dt;
      this.x+=this.vx*dt;
      this.x=clamp(this.x,this.originX-260,this.originX+260);
      if(this.subTimer<=0){ this.vx=0; this.state='IDLE'; this.stateTimer=1.4; }
    }
  }
  updateGolem(dt,player){
    if(this.state==='IDLE' && this.stateTimer<=0){
      this.state = Math.random()>0.5 ? 'SLAM' : 'THROW';
      this.stateTimer=0.5;
    } else if(this.state==='SLAM' && this.stateTimer<=0){
      Game.hazards.push(new Hazard(this.x-260,260));
      Game.hazards.push(new Hazard(this.x+this.w,260));
      Audio.sfx.hit();
      this.state='IDLE'; this.stateTimer=2.2;
    } else if(this.state==='THROW' && this.stateTimer<=0){
      const dir=player.x>this.x?1:-1;
      const b=new Bullet(this.x+this.w/2,this.y,dir*260,-420,false,5,'boulder','#8d6e63');
      b.gravity=true; b.w=16; b.h=16;
      Game.bullets.push(b);
      Audio.sfx.shootTerra();
      this.state='IDLE'; this.stateTimer=2.2;
    }
  }
  draw(ctx,camX){
    const px=Math.floor(this.x-camX), py=Math.floor(this.y);
    if(this.invincibleTimer>0 && Math.floor(Date.now()/50)%2===0) return;
    ctx.fillStyle='#000';
    ctx.fillRect(px-3,py-3,this.w+6,this.h+6);
    ctx.fillStyle=this.color;
    if(this.kind==='hornet'){
      ctx.beginPath();
      ctx.moveTo(px+this.w/2,py);
      ctx.lineTo(px+this.w,py+this.h/2);
      ctx.lineTo(px+this.w/2,py+this.h);
      ctx.lineTo(px,py+this.h/2);
      ctx.closePath(); ctx.fill();
    } else if(this.kind==='serpent'){
      ctx.beginPath();
      ctx.ellipse(px+this.w/2,py+this.h/2,this.w/2,this.h/2,0,0,Math.PI*2);
      ctx.fill();
    } else if(this.kind==='falcon'){
      ctx.beginPath();
      ctx.moveTo(px,py+this.h/2);
      ctx.lineTo(px+this.w/2,py);
      ctx.lineTo(px+this.w,py+this.h/2);
      ctx.lineTo(px+this.w/2,py+this.h);
      ctx.closePath(); ctx.fill();
    } else {
      ctx.fillRect(px,py,this.w,this.h);
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.fillRect(px+8,py+8,this.w-16,this.h-16);
    }
  }
  takeDamage(amount){
    super.takeDamage(amount);
    Audio.sfx.bossHit();
    if(this.hp<=0) Game.bossDefeated();
  }
}

/* ---------------- PICKUP ---------------- */
class Pickup {
  constructor(x,y,type){
    this.x=x; this.y=y; this.w=16; this.h=16; this.type=type; // 'hp' or 'ammo'
    this.markedForDeletion=false; this.time=0;
  }
  update(dt,player){
    this.time+=dt;
    this.y += Math.sin(this.time*5)*0.5;
    if(rectIntersect(this,player)){
      if(this.type==='hp'){
        player.hp=Math.min(player.hp+8,player.maxHp);
      } else {
        const w=player.currentWeapon();
        if(w.key!=='buster') Save.data.ammo[w.key]=Math.min(Save.data.ammo[w.key]+6,w.ammoMax);
        Object.keys(Save.data.ammo).forEach(k=>{
          Save.data.ammo[k]=Math.min(Save.data.ammo[k]+3, WEAPONS.find(w2=>w2.key===k).ammoMax);
        });
      }
      Audio.sfx.pickup();
      this.markedForDeletion=true;
    }
  }
  draw(ctx,camX){
    const px=Math.floor(this.x-camX), py=Math.floor(this.y);
    ctx.fillStyle='#000';
    ctx.fillRect(px-1,py-1,this.w+2,this.h+2);
    ctx.fillStyle= this.type==='hp' ? '#00ff00' : '#ffd54f';
    ctx.fillRect(px,py,this.w,this.h);
  }
}

/* ---------------- PARTICLE ---------------- */
class Particle {
  constructor(x,y,color){
    this.x=x; this.y=y;
    this.vx=(Math.random()-0.5)*300; this.vy=(Math.random()-0.5)*300;
    this.life=0.4; this.color=color;
  }
  update(dt){ this.x+=this.vx*dt; this.y+=this.vy*dt; this.life-=dt; }
  draw(ctx,camX){
    ctx.fillStyle=this.color;
    ctx.globalAlpha=Math.max(this.life*2.5,0);
    ctx.fillRect(Math.floor(this.x-camX),Math.floor(this.y),4,4);
    ctx.globalAlpha=1;
  }
}

/* ---------------- MAP ---------------- */
class TileMap {
  constructor(rows){
    this.height=rows.length;
    this.width=rows[0].length;
    this.data=new Array(this.width*this.height).fill(0);
    for(let y=0;y<this.height;y++)
      for(let x=0;x<this.width;x++)
        this.data[y*this.width+x]=parseInt(rows[y][x],10);
  }
  getTile(x,y){
    if(x<0||x>=this.width||y<0) return 1;
    if(y>=this.height) return 1;
    return this.data[y*this.width+x];
  }
}

/* ---------------- ROOM DEFINITIONS ---------------- */
function rowsForRoom(idx){
  // 14 rows tall, ~70 cols; ground floor + a few platforms, arena at the end
  const W=70;
  const rows=[];
  for(let r=0;r<14;r++) rows.push(new Array(W).fill('0'));
  // border walls
  for(let x=0;x<W;x++){ rows[0][x]='1'; rows[13][x]='1'; }
  for(let y=0;y<14;y++){ rows[y][0]='1'; }

  const platformSets=[
    [[10,10,4],[20,8,4],[30,10,3],[42,7,5]],
    [[8,9,3],[16,11,4],[26,7,3],[36,9,4],[46,6,3]],
    [[9,8,4],[18,10,3],[27,8,4],[38,11,3],[48,7,4]],
    [[10,9,4],[19,7,3],[29,10,4],[40,8,3],[50,11,4]]
  ];
  platformSets[idx].forEach(([x,y,len])=>{
    for(let i=0;i<len;i++) rows[y][x+i]='1';
  });
  const spikeSets=[[24,13],[44,13],[54,13]];
  spikeSets.forEach(([x])=>{ if(x<W) rows[13][x]='2'; });

  // boss arena: clear flat floor from col 56 to 68
  for(let x=56;x<W;x++){
    for(let y=1;y<12;y++) rows[y][x]='0';
  }
  return rows.map(r=>r.join(''));
}

const ROOMS = [
  {name:'Blaze Hornet', kind:'hornet', color:'#ff7043', wallTint:'#3a1f1a', hp:40, contactDmg:5, weakTo:null,   grantsWeapon:'flame'},
  {name:'Aqua Serpent', kind:'serpent',color:'#29b6f6', wallTint:'#122a3a', hp:46, contactDmg:5, weakTo:'flame',grantsWeapon:'aqua'},
  {name:'Volt Falcon',  kind:'falcon', color:'#ffee58', wallTint:'#2f2a12', hp:52, contactDmg:6, weakTo:'aqua', grantsWeapon:'volt'},
  {name:'Terra Golem',  kind:'golem',  color:'#8d6e63', wallTint:'#22301a', hp:60, contactDmg:7, weakTo:'volt', grantsWeapon:'terra'}
];

/* ---------------- GAME CONTROLLER ---------------- */
const Game = {
  canvas: document.getElementById('gameCanvas'),
  ctx: document.getElementById('gameCanvas').getContext('2d'),
  lastTime:0,
  state:'HUB', // HUB, PLAY, PAUSED, ROOM_CLEAR, GAMEOVER, WIN
  hubIndex:0,
  currentRoom:-1,
  player:null,
  enemies:[], bullets:[], particles:[], items:[], hazards:[],
  boss:null,
  map:null,
  camX:0,
  bossActive:false,
  bossArenaX:0,
  hubAnimT:0,

  init(){
    Input.init();
    Save.load();
    this.player = new Player(60, 300);
    requestAnimationFrame(t=>this.loop(t));
  },

  enterHub(){
    this.state='HUB';
    this.player.hp=this.player.maxHp;
    this.bullets=[]; this.particles=[]; this.hazards=[];
  },

  startRoom(idx){
    const cfg=ROOMS[idx];
    this.currentRoom=idx;
    this.map=new TileMap(rowsForRoom(idx));
    this.player.x=60; this.player.y=300;
    this.player.checkpoint={x:60,y:300};
    this.player.vx=0; this.player.vy=0; this.player.hp=this.player.maxHp;
    this.player.weaponIndex=0;
    Object.keys(Save.data.ammo).forEach(k=>{
      Save.data.ammo[k]=WEAPONS.find(w=>w.key===k).ammoMax;
    });
    this.enemies=[
      new Enemy(400,300,0),
      new Enemy(700,250,1),
      new Enemy(1100,300,0)
    ];
    this.bullets=[]; this.particles=[]; this.hazards=[];
    this.items=[ new Pickup(600,300,'hp'), new Pickup(950,280,'ammo') ];
    this.boss=new Boss({x: this.map.width*TILE-140, y:280, w:56, h:64,
      color:cfg.color, kind:cfg.kind, hp:cfg.hp, contactDmg:cfg.contactDmg,
      weakTo:cfg.weakTo, name:cfg.name});
    this.bossActive=false;
    this.bossArenaX=(56)*TILE;
    this.camX=0;
    this.state='PLAY';
  },

  bossDefeated(){
    const cfg=ROOMS[this.currentRoom];
    Save.data.defeated[this.currentRoom]=true;
    Save.data.ammo[cfg.grantsWeapon]=WEAPONS.find(w=>w.key===cfg.grantsWeapon).ammoMax;
    Save.store();
    Audio.sfx.victory();
    this.state='ROOM_CLEAR';
    this.clearTimer=3.5;
  },

  loop(ts){
    let dt=(ts-this.lastTime)/1000;
    this.lastTime=ts;
    if(dt>0.1) dt=0.1;
    this.update(dt);
    this.draw();
    requestAnimationFrame(t=>this.loop(t));
  },

  update(dt){
    Input.update();

    if(this.state==='HUB'){ this.updateHub(dt); return; }

    if(this.state==='ROOM_CLEAR'){
      this.clearTimer-=dt;
      if(this.clearTimer<=0 || Input.pressed.jump) this.enterHub();
      return;
    }
    if(this.state==='GAMEOVER'){
      if(Input.pressed.restart) this.startRoom(this.currentRoom);
      if(Input.pressed.hub) this.enterHub();
      return;
    }
    if(this.state==='WIN'){
      if(Input.pressed.restart){ Save.reset(); this.enterHub(); }
      return;
    }
    if(Input.pressed.pause) this.state = this.state==='PAUSED' ? 'PLAY' : 'PAUSED';
    if(this.state==='PAUSED') return;
    if(Input.pressed.hub){ this.enterHub(); return; }
    if(Input.pressed.restart){ this.startRoom(this.currentRoom); return; }

    // PLAY
    this.player.update(dt,this.map);
    if(this.player.x > this.bossArenaX - 40 && !this.bossActive) this.bossActive=true;
    if(this.bossActive) this.boss.update(dt,this.map,this.player);

    this.enemies.forEach(e=>e.update(dt,this.map,this.player));
    this.bullets.forEach(b=>b.update(dt,this.map));
    this.items.forEach(i=>i.update(dt,this.player));
    this.particles.forEach(p=>p.update(dt));
    this.hazards.forEach(h=>h.update(dt,this.player));

    this.bullets.forEach(b=>{
      if(b.markedForDeletion) return;
      if(b.isPlayer){
        this.enemies.forEach(e=>{
          if(!e.markedForDeletion && rectIntersect(b,e)){ e.takeDamage(b.dmg); b.markedForDeletion=true; }
        });
        if(this.bossActive && this.boss.hp>0 && rectIntersect(b,this.boss)){
          let dmg=b.dmg;
          if(this.boss.weakTo() === b.kind) dmg*=3;
          this.boss.takeDamage(dmg);
          b.markedForDeletion=true;
        }
      } else {
        if(rectIntersect(b,this.player)){ this.player.takeDamage(b.dmg); b.markedForDeletion=true; }
      }
    });

    this.enemies=this.enemies.filter(e=>!e.markedForDeletion);
    this.bullets=this.bullets.filter(b=>!b.markedForDeletion);
    this.items=this.items.filter(i=>!i.markedForDeletion);
    this.particles=this.particles.filter(p=>p.life>0);
    this.hazards=this.hazards.filter(h=>!h.done);

    if(this.player.hp<=0) this.state='GAMEOVER';
    if(Save.data.defeated.every(d=>d)) this.state='WIN';

    let targetCam=this.player.x-SCREEN_W/2;
    if(this.bossActive) targetCam=Math.max(targetCam,this.bossArenaX-100);
    targetCam=clamp(targetCam,0,this.map.width*TILE-SCREEN_W);
    this.camX += (targetCam-this.camX)*0.12;
  },

  updateHub(dt){
    this.hubAnimT+=dt;
    if(Input.pressed.left){ this.hubIndex=(this.hubIndex+3)%4; Audio.sfx.select(); }
    if(Input.pressed.right){ this.hubIndex=(this.hubIndex+1)%4; Audio.sfx.select(); }
    if(Input.pressed.jump){ Audio.sfx.confirm(); this.startRoom(this.hubIndex); }
  },

  draw(){
    const ctx=this.ctx;
    ctx.clearRect(0,0,SCREEN_W,SCREEN_H);
    if(this.state==='HUB'){ this.drawHub(ctx); return; }

    ctx.fillStyle=C_BG;
    ctx.fillRect(0,0,SCREEN_W,SCREEN_H);

    const cfg=ROOMS[this.currentRoom];
    const startCol=Math.floor(this.camX/TILE);
    const endCol=startCol+(SCREEN_W/TILE)+1;
    for(let y=0;y<this.map.height;y++){
      for(let x=startCol;x<=endCol;x++){
        const t=this.map.getTile(x,y);
        const px=Math.floor(x*TILE-this.camX), py=y*TILE;
        if(t===1){
          ctx.fillStyle=C_WALL;
          ctx.fillRect(px,py,TILE,TILE);
          ctx.strokeStyle=cfg.wallTint;
          ctx.strokeRect(px,py,TILE,TILE);
        } else if(t===2){
          ctx.fillStyle=C_SPIKE;
          ctx.beginPath();
          ctx.moveTo(px,py+TILE); ctx.lineTo(px+TILE/2,py); ctx.lineTo(px+TILE,py+TILE);
          ctx.fill();
        }
      }
    }

    this.items.forEach(i=>i.draw(ctx,this.camX));
    this.enemies.forEach(e=>e.draw(ctx,this.camX));
    this.hazards.forEach(h=>h.draw(ctx,this.camX));
    if(this.bossActive && this.boss.hp>0) this.boss.draw(ctx,this.camX);
    this.player.draw(ctx,this.camX);
    this.bullets.forEach(b=>b.draw(ctx,this.camX));
    this.particles.forEach(p=>p.draw(ctx,this.camX));

    this.drawHUD(ctx);

    if(this.state==='PAUSED') this.text(ctx,'PAUSED',SCREEN_W/2,SCREEN_H/2,30,'#ff0');
    if(this.state==='GAMEOVER'){
      ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.fillRect(0,0,SCREEN_W,SCREEN_H);
      this.text(ctx,'DEFEATED',SCREEN_W/2,220,40,'#f00');
      this.text(ctx,'Press R to Retry  /  Q for Hub',SCREEN_W/2,265,18,'#fff');
    }
    if(this.state==='ROOM_CLEAR'){
      ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.fillRect(0,0,SCREEN_W,SCREEN_H);
      this.text(ctx,cfg.name+' DEFEATED!',SCREEN_W/2,200,32,'#0f0');
      this.text(ctx,'Weapon Acquired: '+WEAPONS.find(w=>w.key===cfg.grantsWeapon).name,SCREEN_W/2,240,20,'#0ff');
      this.text(ctx,'Returning to hub...',SCREEN_W/2,275,16,'#fff');
    }
    if(this.state==='WIN'){
      ctx.fillStyle='rgba(0,0,0,0.9)'; ctx.fillRect(0,0,SCREEN_W,SCREEN_H);
      this.text(ctx,'ALL BOSSES DEFEATED',SCREEN_W/2,210,34,'#0f0');
      this.text(ctx,'STEEL RANGER STANDS VICTORIOUS',SCREEN_W/2,250,18,'#0ff');
      this.text(ctx,'Press R to play again',SCREEN_W/2,290,16,'#fff');
    }
  },

  drawHUD(ctx){
    const meter=(x,y,cur,max,color,label)=>{
      const segs=14, w=10,h=6,gap=2;
      ctx.fillStyle='#000'; ctx.fillRect(x-2,y-2,w+4,segs*(h+gap)+4);
      const active=Math.ceil((cur/max)*segs);
      for(let i=0;i<segs;i++){
        const yy=y+segs*(h+gap)-(i*(h+gap))-h;
        ctx.fillStyle = i<active ? color : '#1c1c1c';
        ctx.fillRect(x,yy,w,h);
      }
      ctx.fillStyle='#fff'; ctx.font='10px monospace';
      ctx.textAlign='center';
      ctx.fillText(label,x+w/2,y+segs*(h+gap)+14);
    };
    meter(30,20,this.player.hp,this.player.maxHp,C_HERO,'HP');
    if(this.bossActive && this.boss && this.boss.hp>0){
      meter(60,20,this.boss.hp,this.boss.maxHp,this.boss.color,'BOSS');
      ctx.fillStyle='#fff'; ctx.font='bold 14px monospace'; ctx.textAlign='left';
      ctx.fillText(this.boss.name, 90, 30);
    }
    // weapon indicator
    const w=this.player.currentWeapon();
    const ammo=this.player.ammoFor(w);
    ctx.textAlign='right';
    ctx.fillStyle=w.color; ctx.font='bold 14px monospace';
    ctx.fillText(w.name, SCREEN_W-20, 24);
    ctx.fillStyle='#aaa'; ctx.font='12px monospace';
    ctx.fillText(ammo===Infinity? '∞' : (ammo+'/'+w.ammoMax), SCREEN_W-20, 42);
  },

  drawHub(ctx){
    ctx.fillStyle='#05070a';
    ctx.fillRect(0,0,SCREEN_W,SCREEN_H);
    // starfield-ish grid
    ctx.strokeStyle='rgba(0,229,255,0.05)';
    for(let x=0;x<SCREEN_W;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,SCREEN_H); ctx.stroke(); }

    this.text(ctx,'STEEL RANGER',SCREEN_W/2,60,44,'#00e5ff');
    this.text(ctx,'Select a Boss Room',SCREEN_W/2,95,16,'#617d98');

    // hero portrait center
    const cx=SCREEN_W/2, cy=250;
    const bob=Math.sin(this.hubAnimT*2)*4;
    ctx.save();
    ctx.translate(cx-14, cy+bob-24);
    const fakePlayer = this.player;
    const savedX=fakePlayer.x, savedY=fakePlayer.y;
    fakePlayer.x=0; fakePlayer.y=0;
    fakePlayer.facing=1; fakePlayer.runFrame=4; fakePlayer.invincibleTimer=0;
    fakePlayer.draw(ctx,0);
    fakePlayer.x=savedX; fakePlayer.y=savedY;
    ctx.restore();

    const gateW=150, gateGap=30;
    const totalW=gateW*4+gateGap*3;
    let gx=cx-totalW/2;
    const gy=380;
    ROOMS.forEach((cfg,i)=>{
      const selected=(i===this.hubIndex);
      const defeated=Save.data.defeated[i];
      ctx.fillStyle= defeated ? '#0a2a12' : '#111622';
      ctx.fillRect(gx,gy,gateW,100);
      ctx.strokeStyle= selected ? '#00e5ff' : (defeated?'#2e7d32':'#334');
      ctx.lineWidth= selected?3:1;
      ctx.strokeRect(gx,gy,gateW,100);

      ctx.fillStyle=cfg.color;
      ctx.beginPath();
      ctx.arc(gx+gateW/2, gy+35, 18, 0, Math.PI*2);
      ctx.fill();

      ctx.fillStyle='#fff'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
      ctx.fillText(cfg.name, gx+gateW/2, gy+72);
      ctx.fillStyle= defeated ? '#66ff66' : '#888';
      ctx.font='11px monospace';
      ctx.fillText(defeated? 'DEFEATED' : (cfg.weakTo? 'Weak vs '+WEAPONS.find(w=>w.key===cfg.weakTo).name : 'No known weakness'), gx+gateW/2, gy+88);

      if(selected){
        ctx.fillStyle='#00e5ff';
        ctx.beginPath();
        ctx.moveTo(gx+gateW/2-6, gy-12);
        ctx.lineTo(gx+gateW/2+6, gy-12);
        ctx.lineTo(gx+gateW/2, gy-2);
        ctx.fill();
      }
      gx += gateW+gateGap;
    });

    this.text(ctx,'← / → choose   Z confirm',SCREEN_W/2,500,14,'#617d98');
  },

  text(ctx,str,x,y,size,color){
    ctx.fillStyle=color;
    ctx.font=`bold ${size}px 'Courier New'`;
    ctx.textAlign='center';
    ctx.fillText(str,x,y);
  }
};

Game.init();
</script>
